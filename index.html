    <style>
      /* Sticky promo — was partly off-screen (right: -91px) */
      .sticky-button {
        position: fixed;
        right: 0;
        top: 32%;
        transform: translateY(-50%);
        z-index: 1000;
      }

      .sticky-button button {
        padding: 10px 18px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px 0 0 5px;
        cursor: pointer;
        transform: rotate(-90deg);
        transform-origin: right center;
        font-weight: 700;
        box-shadow: -2px 2px 8px rgba(0, 0, 0, 0.2);
      }

      .sticky-button button:hover {
        background-color: #165da9;
      }

      @media (max-width: 480px) {
        .sticky-button {
          top: auto;
          bottom: 100px;
          right: 8px;
          transform: none;
        }
        .sticky-button button {
          transform: none;
          border-radius: 8px;
        }
      }

      .image-popup-overlay {
        display: none;
        position: fixed;
        z-index: 1001;
        inset: 0;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        padding: 16px;
        box-sizing: border-box;
      }

      .image-popup-overlay.is-open {
        display: flex;
      }

      .image-popup-inner {
        position: relative;
        max-width: min(920px, 100%);
        max-height: 90vh;
        background: #f9f9f9;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      }

      .image-popup-inner img {
        display: block;
        max-width: 100%;
        max-height: 75vh;
        width: auto;
        height: auto;
        margin: 0 auto;
      }

      .image-popup-close {
        position: absolute;
        top: 4px;
        right: 8px;
        color: #333;
        font-size: 32px;
        font-weight: bold;
        line-height: 1;
        cursor: pointer;
        z-index: 2;
        background: rgba(255, 255, 255, 0.9);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        padding: 0;
      }

      .image-popup-close:hover {
        background: #fff;
        color: #000;
      }
    </style>

  <body>
    <div id="root"></div>

    <div class="sticky-button">
      <button type="button" id="showImageButton">New x1000</button>
    </div>

    <div id="imagePopup" class="image-popup-overlay" role="dialog" aria-modal="true" aria-label="Promo image">
      <div class="image-popup-inner">
        <button type="button" class="image-popup-close" id="imagePopupClose" aria-label="Close">&times;</button>
        <img
          src="/assets/cartoon-of-meme.jpg"
          alt="Cartoon of meme"
          id="popupImage"
        />
      </div>
    </div>

    <script>
      /* Buvo užkomentuota visame <!-- ... --> — Tawk ir popup neveikė */
      (function () {
        var Tawk_API = window.Tawk_API || {};
        window.Tawk_LoadStart = new Date();
        var s1 = document.createElement("script");
        var s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        s1.src = "https://embed.tawk.to/64233c2a31ebfa0fe7f5343b/1gskq6283";
        s1.charset = "UTF-8";
        s1.setAttribute("crossorigin", "*");
        s0.parentNode.insertBefore(s1, s0);
      })();

      document.addEventListener("DOMContentLoaded", function () {
        var btn = document.getElementById("showImageButton");
        var popup = document.getElementById("imagePopup");
        var closeBtn = document.getElementById("imagePopupClose");
        if (!btn || !popup || !closeBtn) return;

        function openPopup() {
          popup.classList.add("is-open");
          document.body.style.overflow = "hidden";
        }

        function closePopup() {
          popup.classList.remove("is-open");
          document.body.style.overflow = "";
        }

        btn.addEventListener("click", openPopup);
        closeBtn.addEventListener("click", closePopup);

        popup.addEventListener("click", function (e) {
          if (e.target === popup) closePopup();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && popup.classList.contains("is-open")) {
            closePopup();
          }
        });
      });
    </script>
  </body>
