# Deploy index.html + patched JS to VPS over SSH/SCP.
#
# Repo → Settings → Secrets and variables → Actions:
#   VPS_HOST             (IP or hostname, no "ssh user@" prefix)
#   VPS_USER             (e.g. cartoonofmeme)
#   VPS_SSH_PRIVATE_KEY  (full private key: -----BEGIN ... KEY----- through END)
#
# If a job still fails, open the run log — common issues:
#   • Secret empty / wrong name (must match exactly)
#   • Private key pasted with lost newlines — re-paste the whole key
#   • Server public key not in ~/.ssh/authorized_keys for that user
#   • Wrong VPS_HOST or firewall blocking GitHub → port 22
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage bundle at repo root for SCP
        run: cp -f assets/index--2owymTR.js ./index--2owymTR.js

      - name: Check host and user secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$VPS_HOST" || { echo "::error::Set Actions secret VPS_HOST"; exit 1; }
          test -n "$VPS_USER" || { echo "::error::Set Actions secret VPS_USER"; exit 1; }

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -T 10 "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files (scp)
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -e
          REMOTE="/home/cartoonofmeme/htdocs/cartoonofmeme.com"
          OPTS="-o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"
          scp $OPTS index.html "${SSH_USER}@${SSH_HOST}:${REMOTE}/index.html"
          scp $OPTS index--2owymTR.js "${SSH_USER}@${SSH_HOST}:${REMOTE}/assets/index--2owymTR.js"
