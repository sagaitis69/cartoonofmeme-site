# Įkelia index.html ir assets/index--2owymTR.js į VPS po kiekvieno push į main.
# Slaptų nėra faile — nustatyk GitHub → Settings → Secrets and variables → Actions:
#   VPS_HOST          (pvz. 123.45.67.89 arba domenas)
#   VPS_USER          (pvz. cartoonofmeme)
#   VPS_SSH_PRIVATE_KEY (pilnas privatų SSH raktas, prasideda -----BEGIN ... KEY-----)
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # appleboy/scp-action keeps path segments: source "assets/foo.js" + target ".../assets/"
      # became ".../assets/assets/foo.js" on the server — old bundle kept loading. Flatten name.
      - name: Stage bundle at repo root for SCP
        run: cp -f assets/index--2owymTR.js ./index--2owymTR.js

      - name: Copy index.html to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "index.html"
          target: "/home/cartoonofmeme/htdocs/cartoonofmeme.com/"
          overwrite: true

      - name: Copy patched JS bundle (no green Blowfish block)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "index--2owymTR.js"
          target: "/home/cartoonofmeme/htdocs/cartoonofmeme.com/assets/"
          overwrite: true
